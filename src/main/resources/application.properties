
# ====================== 服务器配置 ======================
server.port=8081
spring.application.name=online-shopping

# ====================== MySQL 数据源 (本地Docker) ======================
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.url=jdbc:mysql://localhost:3307/product?useSSL=false&serverTimezone=Asia/Shanghai&characterEncoding=UTF-8&allowPublicKeyRetrieval=true&connectionCollation=utf8mb4_unicode_ci&sessionVariables=character_set_client=utf8mb4,character_set_connection=utf8mb4,character_set_results=utf8mb4
spring.datasource.username=shop
spring.datasource.password=shop123

# ====================== HikariCP 连接池 ======================
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.idle-timeout=30000
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.pool-name=HikariPool

# ====================== MyBatis-Plus ======================
mybatis-plus.mapper-locations=classpath:/mapper/*.xml
mybatis-plus.type-aliases-package=com.shop.onlineshopping.entity
mybatis-plus.configuration.map-underscore-to-camel-case=true
mybatis-plus.configuration.log-impl=org.apache.ibatis.logging.stdout.StdOutImpl

# ====================== JPA (仅用于ddl-auto辅助) ======================
spring.jpa.show-sql=false
spring.jpa.hibernate.ddl-auto=none
spring.jpa.open-in-view=false

# ====================== 静态资源 ======================
spring.web.resources.static-locations=classpath:/static/
spring.mvc.static-path-pattern=/**
spring.web.resources.cache.cachecontrol.no-cache=true
spring.web.resources.cache.cachecontrol.no-store=true

# ====================== 邮件配置 (QQ邮箱SMTP) ======================
# 配置步骤:
#   1. 登录QQ邮箱 → 设置 → 账户 → POP3/SMTP服务 → 开启
#   2. 获取授权码 (不是QQ密码!)
#   3. 将下方 your_email@qq.com 替换为你的QQ邮箱
#   4. 将 your_smtp_authorization_code 替换为授权码
# 注意: 未配置时系统可正常运行, 仅发货邮件通知功能跳过
spring.mail.host=smtp.qq.com
spring.mail.port=587
spring.mail.username=your_email@qq.com
spring.mail.password=your_smtp_authorization_code
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# ====================== Actuator监控 ======================
management.endpoints.web.exposure.include=health,info
